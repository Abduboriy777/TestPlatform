{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="glass main-card p-4 p-lg-5">
            <h2 class="fw-bold mb-3">Set new password</h2>
            <form method="post" class="mt-4">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn btn-primary rounded-pill px-4" type="submit">Save password</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
