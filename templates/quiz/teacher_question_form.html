{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="glass main-card p-4">
            <h2 class="fw-bold mb-3">{{ title }}</h2>
            <p class="opacity-75">Quiz: {{ quiz.title }}</p>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn btn-primary rounded-pill px-4" type="submit">
                    Save
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
